[build]
  base = "/"
  publish = "web/build"
  command = "npm run build --workspace=web"

[build.environment]
  NODE_VERSION = "22"
  NODE_PATH = "/opt/build/repo/node_modules"

# Netlify Functions 配置
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["mongoose", "express", "cors", "express-async-errors", "dotenv"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
