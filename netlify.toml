[build]
  base = "/"
  publish = "web/build"
  command = "npm install --workspace=web --include-workspace-root && npm run build --workspace=web"

[[redirects]]
  from = "/api/*"
  to = "https://japanese-learning-app-backend.netlify.app/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
